<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLink - Videollamada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
    <link th:href="@{/css/styles.css}" rel="stylesheet">

    <style>
    #localVideo, #remoteVideo {
        width: 100%;
        height: 300px;
        background-color: #000;
        border-radius: 10px;
        object-fit: cover;
    }

    /* NUEVO DISEÑO DE BOTONES */
    #controlButtons button {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: none;
        font-size: 26px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: all 0.25s ease;
    }

    #controlButtons button:hover {
        transform: scale(1.12);
        box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    /* Colores más elegantes */
    #btnMute {
        background: #ffb84d; /* naranja suave */
        color: #fff;
    }

    #btnCamera {
        background: #29b6f6; /* azul turquesa */
        color: white;
    }

    #btnEnd {
        background: #e53935; /* rojo fuerte */
        color: white;
    }

    #btnEnd:hover {
        animation: shake 0.3s;
    }

    /* Pequeña vibración al pasar el mouse sobre el botón de colgar */
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-3px); }
        50% { transform: translateX(3px); }
        75% { transform: translateX(-2px); }
        100% { transform: translateX(0); }
    }
</style>

</head>

<body>

<!-- HEADER -->
<header id="header" class="p-3">
    <div class="container">
        <nav class="navbar navbar-expand-lg">
            <a class="navbar-brand text-light fs-2 fw-bold" th:href="@{/}" id="logo-bootstrap">MediLink</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/USER/indexUser}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/USER/nosotrosUser}">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/USER/serviciosUser}">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/USER/citasUser}">Citas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/USER/contactoUser}">Contacto</a></li>
                </ul>

                <div class="d-flex align-items-center">

                    <th:block th:if="${session.usuarioLogueado == null}">
                        <a th:href="@{/login}" class="btn btn-outline-light me-2">Iniciar Sesión</a>
                        <a th:href="@{/registro}" class="btn btn-primary">Registrarse</a>
                    </th:block>

                    <th:block th:if="${session.usuarioLogueado != null}">
                        <span class="text-light me-3 fw-bold">
                            Hola, <span th:text="${session.usuarioLogueado.nombre}"></span> 👋
                        </span>
                        <a th:href="@{/logout}" class="btn btn-danger">Cerrar Sesión</a>
                    </th:block>

                </div>
            </div>
        </nav>
    </div>
</header>


<!-- CUERPO PRINCIPAL -->
<main class="py-5 bg-light">
    <div class="container">
        <h2 class="text-center fw-bold mb-4">Sala de Videoconsulta</h2>

        <div class="row g-4">

            <!-- VIDEO REMOTO -->
            <div class="col-md-8">
                <div class="bg-dark p-2 rounded shadow">
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
            </div>

            <!-- VIDEO LOCAL -->
            <div class="col-md-4">
                <div class="bg-secondary p-2 rounded shadow">
                    <video id="localVideo" autoplay muted playsinline></video>
                </div>
            </div>
        </div>

        <!-- CONTROLES -->
            <div class="text-center mt-4" id="controlButtons">

    <button id="btnMute" class="me-4">
        <i class="fas fa-microphone-slash"></i>
    </button>

    <button id="btnCamera" class="me-4">
        <i class="fas fa-video-slash"></i>
    </button>

    <button id="btnEnd">
        <i class="fas fa-phone-slash"></i>
    </button>

</div>


    </div>
</main>


<!-- FOOTER -->
<footer class="py-4 text-center text-dark">
    <p>© MediLink. Todos los derechos reservados.</p>
</footer>


<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/a2e014c7c3.js" crossorigin="anonymous"></script>

<script>
    const localVideo = document.getElementById("localVideo");

    // INICIAR CÁMARA LOCAL
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
            localVideo.srcObject = stream;
            window.localStream = stream;
        })
        .catch(err => console.error("Error al abrir cámara:", err));

    // APAGAR / PRENDER MICRÓFONO
    document.getElementById("btnMute").onclick = () => {
        const audioTrack = window.localStream.getAudioTracks()[0];
        audioTrack.enabled = !audioTrack.enabled;
    };

    // APAGAR / PRENDER CÁMARA
    document.getElementById("btnCamera").onclick = () => {
        const videoTrack = window.localStream.getVideoTracks()[0];
        videoTrack.enabled = !videoTrack.enabled;
    };

    // COLGAR LLAMADA
    document.getElementById("btnEnd").onclick = () => {
        window.localStream.getTracks().forEach(t => t.stop());
        window.location.href = "/USER/serviciosUser";
    };
</script>

</body>
</html>
