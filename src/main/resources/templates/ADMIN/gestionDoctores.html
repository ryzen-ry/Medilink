<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Doctores - MediLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold text-light" href="#">Gestión de Doctores</a>

    <div class="ms-auto d-flex align-items-center">
        <a href="/ADMIN/dashboard" class="btn btn-outline-light btn-sm me-3">
            <i class="fas fa-arrow-left me-1"></i>
            Volver al Dashboard
        </a>

        <span class="text-light fw-bold me-3">
            👋 Hola, <span th:text="${session.usuarioLogueado.nombre}"></span>
        </span>

        <a href="/logout" class="btn btn-danger btn-sm">
            Cerrar Sesión
        </a>
    </div>
</nav>

<div class="container mt-4">
    <!-- Alertas de éxito/error -->
    <div th:if="${param.success == 'created'}" class="alert alert-success alert-dismissible fade show" role="alert">
        Doctor registrado correctamente.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.success == 'deleted'}" class="alert alert-success alert-dismissible fade show" role="alert">
        Doctor eliminado correctamente.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row">
        <!-- Formulario de Registro -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Registrar Nuevo Doctor</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/ADMIN/doctores/agregar}" th:object="${doctor}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apellidos</label>
                            <input type="text" class="form-control" th:field="*{apellidos}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Especialidad</label>
                            <input type="text" class="form-control" th:field="*{especialidad}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('especialidad')}" th:errors="*{especialidad}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Número de Colegiatura</label>
                            <input type="text" class="form-control" th:field="*{numeroColegiatura}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('numeroColegiatura')}" th:errors="*{numeroColegiatura}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" th:field="*{telefono}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Imagen del Doctor</label>
                            <input type="file" name="imageFile" accept="image/*" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-plus-circle me-1"></i>
                            Registrar Doctor
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Lista de Doctores -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Doctores Registrados</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Especialidad</th>
                                    <th>Colegiatura</th>
                                    <th>Email</th>
                                    <th>Teléfono</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="doc : ${doctores}">
                                    <td>
                                        <img th:if="${doc.imagen != null}" th:src="@{/img/doctors/} + ${doc.imagen}" alt="Foto" style="width:48px;height:48px;object-fit:cover;border-radius:6px;margin-right:8px;"/>
                                        <span th:text="${doc.nombre + ' ' + doc.apellidos}"></span>
                                    </td>
                                    <td th:text="${doc.especialidad}"></td>
                                    <td th:text="${doc.numeroColegiatura}"></td>
                                    <td th:text="${doc.email}"></td>
                                    <td th:text="${doc.telefono}"></td>
                                    <td>
                                        <form th:action="@{/ADMIN/doctores/eliminar/{id}(id=${doc.id})}"
                                              method="post"
                                              class="d-inline"
                                              onsubmit="return confirm('¿Seguro que deseas eliminar este doctor?');">
                                            <button type="submit" class="btn btn-danger btn-sm">
                                                <i class="fas fa-trash"></i>
                                                Eliminar
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(doctores)}">
                                    <td colspan="6" class="text-center">No hay doctores registrados</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
