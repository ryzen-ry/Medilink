<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediLink - Registro</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilos -->
  <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>

<body class="bg-light">

  <section class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="max-width: 450px; width: 100%;">
      
      <h2 class="text-center text-primary mb-4 fw-bold">Crear Cuenta</h2>

        <form th:action="@{/registro}" th:object="${usuario}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" th:field="*{nombre}">
                <div class="text-danger" th:errors="*{nombre}" th:if="${#fields.hasErrors('nombre')}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">DNI</label>
                <input type="text" class="form-control" th:field="*{dni}">
                <div class="text-danger" th:errors="*{dni}" th:if="${#fields.hasErrors('dni')}" ></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Teléfono</label>
                <input type="text" class="form-control" th:field="*{telefono}">
                <div class="text-danger" th:errors="*{telefono}" th:if="${#fields.hasErrors('telefono')}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" class="form-control" th:field="*{email}">
                <div class="text-danger" th:errors="*{email}" th:if="${#fields.hasErrors('email')}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" class="form-control" th:field="*{password}">
                <div class="text-danger" th:errors="*{password}" th:if="${#fields.hasErrors('password')}"></div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Registrarse</button>
        </form>


        <p class="text-center mt-4 mb-0">
        ¿Ya tienes cuenta?
        <a th:href="@{/login}" class="text-decoration-none fw-semibold">Inicia sesión aquí</a>
      </p>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
