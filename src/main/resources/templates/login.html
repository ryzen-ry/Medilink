<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediLink - Iniciar Sesión</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="auth-body">

  <section class="section">
    <div class="container auth-container box">
      <h1 class="title has-text-centered has-text-primary">Iniciar Sesión</h1>

        <form th:action="@{/procesar-login}" th:object="${loginDTO}" method="post">

    <div class="field">
        <label class="label">Correo electrónico</label>
        <div class="control">
            <input class="input" type="email" th:field="*{email}" placeholder="ejemplo@correo.com" required>
        </div>
    </div>

    <div class="field">
        <label class="label">Contraseña</label>
        <div class="control">
            <input class="input" type="password" th:field="*{password}" placeholder="********" required>
        </div>
    </div>

    <div class="field mt-5">
        <button class="button is-primary is-fullwidth" type="submit">Ingresar</button>
    </div>

</form>


      <p class="has-text-centered mt-4">
        ¿No tienes cuenta?
        <a th:href="@{/registro}" class="has-text-link">Regístrate aquí</a>
      </p>

      <p th:if="${param.error}" class="has-text-danger has-text-centered mt-3">
        Credenciales incorrectas, intenta nuevamente.
      </p>

      <p th:if="${param.logout}" class="has-text-success has-text-centered mt-3">
        Has cerrado sesión correctamente.
      </p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
